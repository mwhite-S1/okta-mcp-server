services:
  okta-mcp-server:
    container_name: okta-mcp-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file: ".env"
    stdin_open: true
    tty: true
    # This is now indented correctly under the service
    volumes:
      - okta-keyring:/root/.local/share/python_keyring

# The top-level volumes declaration remains at the bottom
volumes:
  okta-keyring: